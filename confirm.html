<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Email Confirmat - ServicePro</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: Arial, sans-serif;
      background-color: #1a1a1a;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    .card {
      background-color: #242424;
      border-radius: 16px;
      padding: 48px 32px;
      text-align: center;
      max-width: 400px;
      width: 90%;
    }
    .icon { font-size: 64px; margin-bottom: 24px; }
    h1 { color: #ff6b2b; font-size: 24px; margin-bottom: 12px; }
    p { color: #aaa; font-size: 15px; line-height: 1.6; margin-bottom: 8px; }
    .badge {
      display: inline-block;
      background-color: #ff6b2b22;
      color: #ff6b2b;
      border-radius: 8px;
      padding: 8px 20px;
      margin-top: 24px;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">✅</div>
    <h1>Email confirmat!</h1>
    <p>Contul tău ServicePro a fost activat cu succes.</p>
    <p>Poți închide această pagină și te poți loga în aplicație.</p>
    <div class="badge">🔧 ServicePro</div>
  </div>
</body>
</html>
